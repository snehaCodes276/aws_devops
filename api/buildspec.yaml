version: 0.2

env:
  variables:
    IMAGE_TAG: latest

phases:
  install:
    commands:
      - echo "Installing required tools..."
      - yum install -y unzip wget

      # Install Trivy (official method - NO 404 errors)
      - echo "Installing Trivy..."
      - rpm -ivh https://github.com/aquasecurity/trivy/releases/latest/download/trivy_0.49.1_Linux-64bit.rpm

      # Install Sonar Scanner
      - echo "Installing Sonar Scanner..."
      - wget https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-4.8.0.2856-linux.zip
      - unzip sonar-scanner-cli-4.8.0.2856-linux.zip
      - mv sonar-scanner-4.8.0.2856-linux sonar-scanner
      - export PATH=$PATH:$(pwd)/sonar-scanner/bin

  pre_build:
    commands:
      - echo "Logging into ECR..."

      # FIX: requires IAM permission (I’ll tell below)
      - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com

      - echo "Setting variables..."
      - REPO_URI=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPO

  build:
    commands:
      - echo "Running SonarQube Scan..."

      # FIX: no "\" line break issue
      - sonar-scanner -Dsonar.projectKey=api -Dsonar.sources=. -Dsonar.host.url=$SONAR_HOST_URL -Dsonar.login=$SONAR_LOGIN

      - echo "Building Docker Image..."
      - docker build -t $REPO_URI:$IMAGE_TAG .

      - echo "Running Trivy Scan..."
      - trivy image --format json --output trivy-report.json $REPO_URI:$IMAGE_TAG || true

  post_build:
    commands:
      - echo "Build completed"

artifacts:
  files:
    - trivy-report.json
