version: 0.2

phases:
  install:
    commands:
      - echo "Installing Trivy"
      - wget https://github.com/aquasecurity/trivy/releases/download/v0.40.0/trivy_0.40.0_Linux-64bit.tar.gz
      - tar -xzf trivy_0.40.0_Linux-64bit.tar.gz
      - mv trivy /usr/local/bin/
      - echo "Installing Sonar Scanner"
      - wget https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-4.8.0.2856-linux.zip
      - unzip sonar-scanner-cli-4.8.0.2856-linux.zip
      - mv sonar-scanner-4.8.0.2856-linux /opt/sonar-scanner
      - export PATH=$PATH:/opt/sonar-scanner/bin
  pre_build:
    commands:
      - echo "Logging in to ECR"
      - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com
      - echo "Setting environment variables"
      - export SONAR_HOST_URL=$SONAR_HOST_URL
      - export SONAR_LOGIN=$SONAR_LOGIN
      - export EKS_CLUSTER_NAME=$EKS_CLUSTER_NAME
      - export ECR_REPO=$ECR_REPO
  build:
    commands:
      - echo "Running SonarQube Scan"
      - sonar-scanner -Dsonar.projectKey=api -Dsonar.sources=. -Dsonar.host.url=$SONAR_HOST_URL -Dsonar.login=$SONAR_LOGIN
      - echo "Building Docker image"
      - docker build -t $ECR_REPO:$CODEBUILD_BUILD_NUMBER .
      - echo "Running Trivy scan"
      - trivy image --format json --output trivy-report.json $ECR_REPO:$CODEBUILD_BUILD_NUMBER

artifacts:
  files:
    - trivy-report.json
  discard-paths: no