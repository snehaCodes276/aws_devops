version: 0.2

phases:
  install:
    commands:
      - echo "Installing Trivy"
      - wget https://github.com/aquasecurity/trivy/releases/latest/download/trivy_0.48.3_Linux-64bit.tar.gz
      - tar -xzf trivy_0.48.3_Linux-64bit.tar.gz
      - mv trivy /usr/bin/

      - echo "Installing Sonar Scanner"
      - wget https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-4.8.0.2856-linux.zip
      - unzip sonar-scanner-cli-4.8.0.2856-linux.zip
      - export PATH=$PATH:$(pwd)/sonar-scanner-4.8.0.2856-linux/bin

  pre_build:
    commands:
      - echo "Logging into ECR"
      - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com

      - REPO_URI=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/web
      - IMAGE_TAG=$CODEBUILD_BUILD_NUMBER

  build:
    commands:
      - echo "Running SonarQube Scan"
      - sonar-scanner \
        -Dsonar.projectKey=web \
        -Dsonar.sources=. \
        -Dsonar.host.url=$SONAR_HOST_URL \
        -Dsonar.login=$SONAR_LOGIN

      - echo "Building Docker Image"
      - docker build -t $REPO_URI:$IMAGE_TAG .

      - echo "Running Trivy Scan"
      - trivy image --format json --output trivy-report.json $REPO_URI:$IMAGE_TAG

  post_build:
    commands:
      - echo "Pushing Docker Image"
      - docker push $REPO_URI:$IMAGE_TAG

artifacts:
  files:
    - trivy-report.json
